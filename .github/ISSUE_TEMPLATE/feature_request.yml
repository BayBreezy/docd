name: Feature Request
description: Propose a new feature or enhancement for Docd
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please search existing issues to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? Who does it affect?
      placeholder: "As a Docd user, I find it difficult to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behaviour or API you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've already tried or thought about.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which part of Docd does this affect?
      multiple: true
      options:
        - Layer / Nuxt module
        - Content & markdown
        - Component API metadata system
        - Prose components
        - Landing components
        - Theming / UI
        - create-docd scaffolder
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, examples from other tools, or anything else that helps explain the idea.
